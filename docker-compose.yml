version: '3.2'

services:

  zms-headless-interface:
    build: .
    env_file:
      - .env
    ports:
      - 5000:5000
    volumes:
      - ./cmsapi:/restapi/cmsapi
    depends_on:
      - zeo-zodb-storage # => rw
      - sql-postgres-storage

  zms-publishing-frontend:
    build: ../../zms4
    env_file:
      - .env
    ports:
      - 8080:8080
    volumes:
      - code:/zms4/Extensions
    depends_on:
      - zeo-zodb-storage # => ro

  zms-editing-backend:
    build: ../../zms4
    env_file:
      - .env
    ports:
      - 9080:8080
    volumes:
      - code:/zms4/Extensions
    depends_on:
      - zeo-zodb-storage # => rw

  zeo-zodb-storage:
    build: ../../zms4
    entrypoint: bin/runzeo -a  zeo-zodb-storage:9100 -f /zms4/var/Data.fs
    env_file:
      - .env
    volumes:
      - zodb:/zms4/var/
    ports:
      - 9100:9100

  sql-postgres-storage:
    image: postgres:9.5
    env_file:
      - .env
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432

# Copy Data.fs into volume unicms_zodb
# docker run --rm -v $PWD:/source -v unicms_zodb:/dest -w /source alpine cp Data.fs /dest
volumes:
  zodb:
  code:
  postgres:
